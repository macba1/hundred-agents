<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hundred Agents — AI workflow infrastructure</title>
  <meta name="description" content="We map how your business runs today, find where AI agents create real value, and deploy them inside your workflows — without breaking the processes that already work.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" href="assets/favicon.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ===================== HEADER ===================== -->
  <header class="site-header">
    <div class="wrap header-inner">
      <a href="#top" class="brand" aria-label="Hundred Agents — home">
        <svg width="26" height="26" viewBox="0 0 40 40" fill="none" aria-hidden="true">
          <rect x="20" y="12" width="8" height="8" fill="#FF4D00"/>
          <rect x="4" y="4" width="32" height="32" stroke="#FFFFFF" stroke-width="2"/>
          <g stroke="#FFFFFF" stroke-width="1.3"><line x1="12" y1="4" x2="12" y2="36"/><line x1="20" y1="4" x2="20" y2="36"/><line x1="28" y1="4" x2="28" y2="36"/><line x1="4" y1="12" x2="36" y2="12"/><line x1="4" y1="20" x2="36" y2="20"/><line x1="4" y1="28" x2="36" y2="28"/></g>
        </svg>
        <span class="name">Hundred Agents</span>
      </a>

      <nav class="nav" aria-label="Primary">
        <a href="#why" data-i18n="nav.why"></a>
        <a href="#what" data-i18n="nav.what"></a>
        <a href="#cases" data-i18n="nav.cases"></a>
        <a href="#how" data-i18n="nav.how"></a>
      </nav>

      <div class="header-right">
        <div class="lang-switch">
          <button type="button" class="lang-btn" data-lang="en">EN</button>
          <span class="dot">·</span>
          <button type="button" class="lang-btn" data-lang="es">ES</button>
        </div>
        <a href="#contact" class="btn-contact"><span data-i18n="nav.contact"></span><span class="sq"></span></a>
      </div>
    </div>
  </header>

  <!-- ===================== HERO ===================== -->
  <section id="top" class="hero">
    <div class="wrap">
      <div class="hero-meta" data-reveal>
        <span class="left"><span class="idx">001</span><span class="slash">/</span><span data-i18n="hero.eyebrow"></span></span>
        <span>Austin, TX — Est. 2026</span>
      </div>

      <h1 class="hero-title" data-reveal>
        <span data-i18n="hero.titlePre"></span><span class="em" data-i18n="hero.titleEm"></span><span data-i18n="hero.titlePost"></span>
      </h1>

      <div class="hero-cols">
        <div data-reveal>
          <p class="hero-sub" data-i18n="hero.subtitle"></p>
        </div>
        <div class="hero-ctas" data-reveal>
          <a href="#contact" class="btn-primary"><span data-i18n="hero.cta1"></span><span class="arr">→</span></a>
          <a href="#cases" class="link-mono">[ <span data-i18n="hero.cta2"></span> ]</a>
        </div>
      </div>

      <!-- FIG.01 — live agentic network (animated canvas) -->
      <figure class="figure hero-figure" data-reveal>
        <span class="crop tl"></span><span class="crop tr"></span><span class="crop bl"></span><span class="crop br"></span>
        <figcaption class="figcap">
          <span class="label">FIG.01 / <span data-i18n="fig1"></span></span>
          <span class="note"><span class="live"></span><span data-i18n="fig1note"></span></span>
        </figcaption>
        <canvas class="viz-canvas" id="viz"></canvas>
        <div class="legend">
          <span><span class="sw agents"></span><span data-i18n="legend.agents"></span></span>
          <span><span class="sw gate"></span><span data-i18n="legend.gate"></span></span>
          <span><span class="sw exec"></span><span data-i18n="legend.exec"></span></span>
        </div>
      </figure>
    </div>
  </section>

  <!-- ===================== WHY ===================== -->
  <section id="why" class="why">
    <div class="wrap">
      <div class="section-head kick-grid" data-reveal>
        <div class="kicker"><span class="idx">001</span> / <span data-i18n="kick.why"></span></div>
        <h2 class="section-h2" data-i18n="why.heading"></h2>
      </div>
      <div class="why-grid" id="why-grid"></div>
    </div>
  </section>

  <!-- ===================== WHAT WE DO ===================== -->
  <section id="what" class="what">
    <div class="wrap">
      <div class="section-head kick-grid" data-reveal>
        <div class="kicker"><span class="idx">002</span> / <span data-i18n="kick.what"></span></div>
        <h2 class="section-h2" data-i18n="what.heading"></h2>
      </div>
      <div class="what-list" id="what-list" data-reveal></div>
    </div>
  </section>

  <!-- ===================== DYNAMIC / CONTROL ===================== -->
  <section class="dyn">
    <div class="wrap">
      <div class="section-head kick-grid" data-reveal>
        <div class="kicker"><span class="idx">003</span> / <span data-i18n="kick.dyn"></span></div>
        <div>
          <h2 class="dyn-h2" data-i18n="dyn.heading"></h2>
          <p class="dyn-body" data-i18n="dyn.body"></p>
        </div>
      </div>

      <figure class="figure dyn-figure" data-reveal>
        <span class="crop tl"></span><span class="crop tr"></span><span class="crop bl"></span><span class="crop br"></span>
        <figcaption class="figcap">
          <span class="label">FIG.02 / <span data-i18n="fig2"></span></span>
          <span class="note"><span data-i18n="fig2note"></span></span>
        </figcaption>
        <div class="dyn-exhibit">
          <div>
            <div class="dyn-inputs-label"><span data-i18n="dyn.inputsLabel"></span> [05]</div>
            <div id="dyn-inputs"></div>
          </div>
          <div class="dyn-conn">
            <div class="v-line"></div>
            <div class="h-line"></div>
            <div class="seed"></div>
            <div class="pkt"></div>
          </div>
          <div class="dyn-out">
            <div class="out-label"><span data-i18n="dyn.outLabel"></span> →</div>
            <div class="out-full" data-i18n="dyn.outFull"></div>
          </div>
        </div>
        <div class="dyn-caption-wrap">
          <p class="dyn-caption" data-i18n="dyn.caption"></p>
        </div>
      </figure>
    </div>
  </section>

  <!-- ===================== USE CASES ===================== -->
  <section id="cases" class="cases">
    <div class="wrap">
      <div class="section-head kick-grid" data-reveal>
        <div class="kicker"><span class="idx">004</span> / <span data-i18n="kick.cases"></span></div>
        <h2 class="section-h2" data-i18n="cases.heading"></h2>
      </div>
      <div class="cases-grid" id="cases-grid"></div>
    </div>
  </section>

  <!-- ===================== HOW IT WORKS ===================== -->
  <section id="how" class="how">
    <div class="wrap">
      <div class="section-head kick-grid" data-reveal>
        <div class="kicker"><span class="idx">005</span> / <span data-i18n="kick.how"></span></div>
        <h2 class="section-h2" data-i18n="how.heading"></h2>
      </div>
      <div class="how-grid" id="how-grid"></div>
    </div>
  </section>

  <!-- ===================== FAQ ===================== -->
  <section class="faq">
    <div class="wrap">
      <div class="section-head kick-grid" data-reveal>
        <div class="kicker"><span class="idx">006</span> / <span data-i18n="kick.faq"></span></div>
        <h2 class="section-h2" data-i18n="faq.heading"></h2>
      </div>
      <div class="faq-body" data-reveal>
        <div></div>
        <div class="faq-list" id="faq-list"></div>
      </div>
    </div>
  </section>

  <!-- ===================== CONTACT ===================== -->
  <section id="contact" class="contact">
    <div class="wrap">
      <div class="contact-head" data-reveal>
        <div class="contact-eyebrow"><span class="idx">007</span> / <span data-i18n="contact.eyebrow"></span></div>
        <h2 class="contact-h2" data-i18n="contact.heading"></h2>
      </div>
      <div class="contact-cols" data-reveal>
        <div>
          <p class="contact-sub" data-i18n="contact.sub"></p>
          <div class="contact-meta" data-i18n="contact.meta"></div>
        </div>
        <div>
          <form class="contact-form" id="contact-form" novalidate>
            <div class="field-row">
              <label class="field">
                <span class="flabel" data-i18n="contact.form.name"></span>
                <input type="text" name="name" id="f-name" autocomplete="name">
              </label>
              <label class="field">
                <span class="flabel" data-i18n="contact.form.email"></span>
                <input type="email" name="email" id="f-email" autocomplete="email">
              </label>
            </div>
            <label class="field">
              <span class="flabel" data-i18n="contact.form.problem"></span>
              <textarea name="problem" id="f-problem" rows="4"></textarea>
            </label>
            <div class="form-err" id="form-err" hidden><span class="sq"></span><span class="msg"></span></div>
            <div class="form-actions">
              <button type="submit" class="btn-submit"><span data-i18n="contact.form.submit"></span><span class="arr">→</span></button>
              <span class="form-privacy" data-i18n="contact.form.privacy"></span>
            </div>
          </form>
          <div class="form-success" id="form-success" hidden>
            <span class="crop tl"></span><span class="crop br"></span>
            <div class="status">STATUS — <span data-i18n="contact.form.status"></span></div>
            <div class="title" data-i18n="contact.form.success"></div>
            <p data-i18n="contact.form.successSub"></p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- ===================== FOOTER ===================== -->
  <footer class="site-footer">
    <div class="wrap footer-inner">
      <div class="footer-brand">
        <svg width="20" height="20" viewBox="0 0 40 40" fill="none" aria-hidden="true">
          <rect x="20" y="12" width="8" height="8" fill="#FF4D00"/>
          <rect x="4" y="4" width="32" height="32" stroke="#FFFFFF" stroke-width="2"/>
          <g stroke="#FFFFFF" stroke-width="1.3"><line x1="12" y1="4" x2="12" y2="36"/><line x1="20" y1="4" x2="20" y2="36"/><line x1="28" y1="4" x2="28" y2="36"/><line x1="4" y1="12" x2="36" y2="12"/><line x1="4" y1="20" x2="36" y2="20"/><line x1="4" y1="28" x2="36" y2="28"/></g>
        </svg>
        <span class="name">Hundred Agents</span>
      </div>
      <span class="footer-text" data-i18n="footer.text"></span>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
